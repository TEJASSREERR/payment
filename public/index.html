<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment App - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333; font-size: 28px; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }
        .logo { font-size: 48px; color: #667eea; margin-bottom: 10px; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #999; font-weight: 500; transition: all 0.3s; border-bottom: 3px solid transparent; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab:hover { color: #667eea; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; transition: all 0.3s; outline: none; }
        .form-group input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; }
        .result.show { display: block; }
        .result.ok { background: #d4edda; color: #155724; }
        .result.fail { background: #f8d7da; color: #721c24; }
        .guest-link { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
        .guest-link a { color: #667eea; text-decoration: none; font-weight: 500; }
        .guest-link a:hover { text-decoration: underline; }
        .badge { display: inline-block; background: #fff3cd; color: #856404; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-shield-alt"></i></div>
        <h1>Payment App</h1>
        <p>Secure payments powered by Razorpay</p>
        <div class="badge">🧪 TEST MODE</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')" id="tab-login">Login</div>
        <div class="tab" onclick="switchTab('register')" id="tab-register">Register</div>
    </div>

    <!-- Login Form -->
    <div id="login-form">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="login-email" placeholder="your@email.com" value="test@example.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="login-password" placeholder="Enter password" value="password123">
        </div>
        <button class="btn" id="login-btn" onclick="login()">
            <span class="spinner" id="login-spin"></span>
            <span id="login-text"><i class="fas fa-sign-in-alt"></i> Login</span>
        </button>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display: none;">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="reg-name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="reg-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="reg-password" placeholder="Min 6 characters">
        </div>
        <button class="btn" id="reg-btn" onclick="register()">
            <span class="spinner" id="reg-spin"></span>
            <span id="reg-text"><i class="fas fa-user-plus"></i> Register</span>
        </button>
    </div>

    <div id="result" class="result"></div>

    <div class="guest-link">
        <a href="payment.html"><i class="fas fa-user-secret"></i> Continue as Guest</a>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('tab-login').className = tab === 'login' ? 'tab active' : 'tab';
        document.getElementById('tab-register').className = tab === 'register' ? 'tab active' : 'tab';
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('result').className = 'result';
    }

    function showResult(type, text) {
        const r = document.getElementById('result');
        r.className = 'result show ' + type;
        r.textContent = (type === 'ok' ? '✅ ' : '❌ ') + text;
    }

    function setLoading(btnId, spinId, textId, text, loading) {
        document.getElementById(btnId).disabled = loading;
        document.getElementById(spinId).style.display = loading ? 'inline-block' : 'none';
        document.getElementById(textId).innerHTML = loading ? 'Processing...' : text;
    }

    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        if (!email || !password) {
            showResult('fail', 'Please fill all fields');
            return;
        }

        setLoading('login-btn', 'login-spin', 'login-text', '<i class="fas fa-sign-in-alt"></i> Login', true);

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                showResult('ok', 'Login successful! Redirecting...');
                setTimeout(() => window.location.href = 'payment.html', 1000);
            } else {
                showResult('fail', data.message || 'Login failed');
            }
        } catch (err) {
            showResult('fail', 'Server error: ' + err.message);
        }

        setLoading('login-btn', 'login-spin', 'login-text', '<i class="fas fa-sign-in-alt"></i> Login', false);
    }

    async function register() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        if (!name || !email || !password) {
            showResult('fail', 'Please fill all fields');
            return;
        }
        if (password.length < 6) {
            showResult('fail', 'Password must be at least 6 characters');
            return;
        }

        setLoading('reg-btn', 'reg-spin', 'reg-text', '<i class="fas fa-user-plus"></i> Register', true);

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (data.success) {
                showResult('ok', 'Registered! Redirecting...');
                setTimeout(() => window.location.href = 'payment.html', 1000);
            } else {
                showResult('fail', data.message || 'Registration failed');
            }
        } catch (err) {
            showResult('fail', 'Server error: ' + err.message);
        }

        setLoading('reg-btn', 'reg-spin', 'reg-text', '<i class="fas fa-user-plus"></i> Register', false);
    }

    // Check if already logged in
    fetch('/api/me')
        .then(r => r.json())
        .then(d => { if (d.success && d.user) window.location.href = 'payment.html'; });
</script>

</body>
</html>
